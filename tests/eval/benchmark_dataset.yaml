    difficulty: hard
    tags: [cte, window, multi_hop, ranking, glossary_term]

  - id: hard_008
    question_vi: "Top 3 sản phẩm bán chạy nhất trong từng quý của năm 2013"
    question_en: "Top 3 products by revenue per quarter in 2013"
    gold_sql: |
      WITH product_sales AS (
        SELECT
          p.EnglishProductName AS product,
          DATEPART(QUARTER, s.OrderDate) AS quarter,
          SUM(s.SalesAmount) AS revenue,
          ROW_NUMBER() OVER (
            PARTITION BY DATEPART(QUARTER, s.OrderDate)
            ORDER BY SUM(s.SalesAmount) DESC
          ) AS rn
        FROM dbo.FactInternetSales s
        JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
        WHERE YEAR(s.OrderDate) = 2013
        GROUP BY p.EnglishProductName, DATEPART(QUARTER, s.OrderDate)
      )
      SELECT quarter, product, revenue
      FROM product_sales
      WHERE rn <= 3
      ORDER BY quarter, revenue DESC
    difficulty: hard
    tags: [cte, window, ranking, trend, glossary_term, multi_hop]

  - id: hard_009
    question_vi: "Tỷ lệ phần trăm doanh thu của mỗi danh mục so với tổng"
    question_en: "Each category's revenue as a percentage of total"
    gold_sql: |
      WITH cat_revenue AS (
        SELECT
          pc.EnglishProductCategoryName AS category,
          SUM(s.SalesAmount) AS revenue
        FROM dbo.FactInternetSales s
        JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
        JOIN dbo.DimProductSubcategory psc ON p.ProductSubcategoryKey = psc.ProductSubcategoryKey
        JOIN dbo.DimProductCategory pc ON psc.ProductCategoryKey = pc.ProductCategoryKey
        GROUP BY pc.EnglishProductCategoryName
      ),
      total AS (
        SELECT SUM(revenue) AS grand_total FROM cat_revenue
      )
      SELECT
        cr.category,
        cr.revenue,
        ROUND(cr.revenue * 100.0 / t.grand_total, 2) AS pct_of_total
      FROM cat_revenue cr
      CROSS JOIN total t
      ORDER BY cr.revenue DESC
    difficulty: hard
    tags: [cte, multi_hop, aggregation, comparison, glossary_term]

  - id: hard_010
    question_vi: "Top 10 khách hàng có nhiều đơn hàng nhất, kèm giá trị trung bình mỗi đơn"
    question_en: "Top 10 customers by order count, with average order value"
    gold_sql: |
      WITH cust_orders AS (
        SELECT
          c.CustomerKey,
          c.FirstName + ' ' + c.LastName AS customer_name,
          COUNT(DISTINCT s.SalesOrderNumber) AS order_count,
          AVG(s.SalesAmount) AS avg_order_value,
          SUM(s.SalesAmount) AS total_revenue
        FROM dbo.FactInternetSales s
        JOIN dbo.DimCustomer c ON s.CustomerKey = c.CustomerKey
        GROUP BY c.CustomerKey, c.FirstName, c.LastName
      )
      SELECT TOP 10 customer_name, order_count, avg_order_value, total_revenue
      FROM cust_orders
      ORDER BY order_count DESC
    difficulty: hard
    tags: [cte, ranking, aggregation, multi_hop, glossary_term]

  - id: hard_011
    question_vi: "Sản phẩm có doanh thu năm 2013 cao hơn năm 2012"
    question_en: "Products whose 2013 revenue exceeds their 2012 revenue"
    gold_sql: |
      WITH yearly AS (
        SELECT
          p.EnglishProductName AS product,
          YEAR(s.OrderDate) AS year,
          SUM(s.SalesAmount) AS revenue
        FROM dbo.FactInternetSales s
        JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
        WHERE YEAR(s.OrderDate) IN (2012, 2013)
        GROUP BY p.EnglishProductName, YEAR(s.OrderDate)
      ),
      pivoted AS (
        SELECT
          product,
          SUM(CASE WHEN year = 2012 THEN revenue ELSE 0 END) AS rev_2012,
          SUM(CASE WHEN year = 2013 THEN revenue ELSE 0 END) AS rev_2013
        FROM yearly
        GROUP BY product
      )
      SELECT product, rev_2012, rev_2013, rev_2013 - rev_2012 AS growth
      FROM pivoted
      WHERE rev_2013 > rev_2012 AND rev_2012 > 0
      ORDER BY growth DESC
    difficulty: hard
    tags: [cte, comparison, aggregation, multi_hop, trend, glossary_term]

  - id: hard_012
    question_vi: "Doanh thu cộng dồn theo từng tháng trong năm 2013"
    question_en: "Cumulative revenue by month in 2013"
    gold_sql: |
      WITH monthly AS (
        SELECT
          MONTH(OrderDate) AS month,
          SUM(SalesAmount) AS revenue
        FROM dbo.FactInternetSales
        WHERE YEAR(OrderDate) = 2013
        GROUP BY MONTH(OrderDate)
      )
      SELECT
        month,
        revenue,
        SUM(revenue) OVER (ORDER BY month) AS cumulative_revenue
      FROM monthly
      ORDER BY month
    difficulty: hard
    tags: [cte, window, trend, glossary_term]

  - id: hard_013
    question_vi: "Khách hàng đã mua hàng vào năm 2013 nhưng chưa từng mua năm 2012"
    question_en: "Customers who bought in 2013 but never in 2012"
    gold_sql: |
      SELECT
        c.CustomerKey,
        c.FirstName,
        c.LastName
      FROM dbo.DimCustomer c
      WHERE EXISTS (
        SELECT 1 FROM dbo.FactInternetSales s
        WHERE s.CustomerKey = c.CustomerKey AND YEAR(s.OrderDate) = 2013
      )
      AND NOT EXISTS (
        SELECT 1 FROM dbo.FactInternetSales s
        WHERE s.CustomerKey = c.CustomerKey AND YEAR(s.OrderDate) = 2012
      )
      ORDER BY c.CustomerKey
    difficulty: hard
    tags: [nested, filtering, comparison]

  - id: hard_014
    question_vi: "Tỷ lệ chuyển đổi: phần trăm khách hàng đã từng mua hàng"
    question_en: "Conversion rate: percentage of customers who have made a purchase"
    gold_sql: |
      SELECT
        COUNT(DISTINCT c.CustomerKey) AS total_customers,
        COUNT(DISTINCT s.CustomerKey) AS buyers,
        ROUND(COUNT(DISTINCT s.CustomerKey) * 100.0 / COUNT(DISTINCT c.CustomerKey), 2) AS conversion_pct
      FROM dbo.DimCustomer c
      LEFT JOIN dbo.FactInternetSales s ON c.CustomerKey = s.CustomerKey
    difficulty: hard
    tags: [aggregation, comparison, multi_hop]

  - id: hard_015
    question_vi: "Sản phẩm có doanh thu cao hơn doanh thu trung bình của danh mục đó"
    question_en: "Products with revenue above the average of their category"
    gold_sql: |
      WITH product_revenue AS (
        SELECT
          p.EnglishProductName AS product,
          pc.EnglishProductCategoryName AS category,
          pc.ProductCategoryKey,
          SUM(s.SalesAmount) AS revenue
        FROM dbo.FactInternetSales s
        JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
        JOIN dbo.DimProductSubcategory psc ON p.ProductSubcategoryKey = psc.ProductSubcategoryKey
        JOIN dbo.DimProductCategory pc ON psc.ProductCategoryKey = pc.ProductCategoryKey
        GROUP BY p.EnglishProductName, pc.EnglishProductCategoryName, pc.ProductCategoryKey
      ),
      cat_avg AS (
        SELECT ProductCategoryKey, AVG(revenue) AS avg_rev
        FROM product_revenue
        GROUP BY ProductCategoryKey
      )
      SELECT pr.product, pr.category, pr.revenue, ca.avg_rev
      FROM product_revenue pr
      JOIN cat_avg ca ON pr.ProductCategoryKey = ca.ProductCategoryKey
      WHERE pr.revenue > ca.avg_rev
      ORDER BY pr.category, pr.revenue DESC
    difficulty: hard
    tags: [cte, multi_hop, comparison, aggregation, glossary_term]

  - id: hard_016
    question_vi: "Xếp hạng doanh thu sản phẩm theo từng tháng năm 2013"
    question_en: "Rank product revenue per month in 2013"
    gold_sql: |
      SELECT
        MONTH(s.OrderDate) AS month,
        p.EnglishProductName AS product,
        SUM(s.SalesAmount) AS revenue,
        RANK() OVER (
          PARTITION BY MONTH(s.OrderDate)
          ORDER BY SUM(s.SalesAmount) DESC
        ) AS month_rank
      FROM dbo.FactInternetSales s
      JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
      WHERE YEAR(s.OrderDate) = 2013
      GROUP BY MONTH(s.OrderDate), p.EnglishProductName
    difficulty: hard
    tags: [window, multi_hop, aggregation, trend, glossary_term]

  - id: hard_017
    question_vi: "Top 5 khu vực đóng góp lớn nhất vào doanh thu Q4 2013"
    question_en: "Top 5 territories by revenue in Q4 2013"
    gold_sql: |
      SELECT TOP 5
        t.SalesTerritoryRegion AS region,
        SUM(s.SalesAmount) AS revenue
      FROM dbo.FactInternetSales s
      JOIN dbo.DimSalesTerritory t ON s.SalesTerritoryKey = t.SalesTerritoryKey
      WHERE YEAR(s.OrderDate) = 2013 AND MONTH(s.OrderDate) BETWEEN 10 AND 12
      GROUP BY t.SalesTerritoryRegion
      ORDER BY revenue DESC
    difficulty: hard
    tags: [ranking, aggregation, multi_hop, trend, glossary_term, filtering]

  - id: hard_018
    question_vi: "Khách hàng có ít nhất 3 đơn hàng với tổng giá trị mỗi đơn trên 500 USD"
    question_en: "Customers with at least 3 orders whose total order value exceeds 500 USD each"
    gold_sql: |
      WITH order_totals AS (
        SELECT
          s.CustomerKey,
          s.SalesOrderNumber,
          SUM(s.SalesAmount) AS order_total
        FROM dbo.FactInternetSales s
        GROUP BY s.CustomerKey, s.SalesOrderNumber
      )
      SELECT
        c.FirstName + ' ' + c.LastName AS customer_name,
        COUNT(*) AS order_count
      FROM order_totals o
      JOIN dbo.DimCustomer c ON o.CustomerKey = c.CustomerKey
      WHERE o.order_total > 500
      GROUP BY c.CustomerKey, c.FirstName, c.LastName
      HAVING COUNT(*) >= 3
      ORDER BY order_count DESC
    difficulty: hard
    tags: [cte, aggregation, filtering, multi_hop, glossary_term]

  - id: hard_019
    question_vi: "Tỷ lệ phần trăm khách hàng theo nhóm tuổi"
    question_en: "Customer percentage by age group"
    gold_sql: |
      WITH age_group AS (
        SELECT
          CASE
            WHEN DATEDIFF(YEAR, BirthDate, '2014-01-01') < 30 THEN 'Under 30'
            WHEN DATEDIFF(YEAR, BirthDate, '2014-01-01') < 50 THEN '30-49'
            WHEN DATEDIFF(YEAR, BirthDate, '2014-01-01') < 70 THEN '50-69'
            ELSE '70+'
          END AS age_range,
          CustomerKey
        FROM dbo.DimCustomer
      ),
      counts AS (
        SELECT age_range, COUNT(*) AS cnt
        FROM age_group
        GROUP BY age_range
      )
      SELECT
        age_range,
        cnt,
        ROUND(cnt * 100.0 / SUM(cnt) OVER (), 2) AS pct
      FROM counts
      ORDER BY cnt DESC
    difficulty: hard
    tags: [cte, window, aggregation]

  - id: hard_020
    question_vi: "Sản phẩm bán chạy nhất theo từng quốc gia trong năm 2013"
    question_en: "Top-selling product per country in 2013"
    gold_sql: |
      WITH country_product AS (
        SELECT
          g.EnglishCountryRegionName AS country,
          p.EnglishProductName AS product,
          SUM(s.SalesAmount) AS revenue,
          ROW_NUMBER() OVER (
            PARTITION BY g.EnglishCountryRegionName
            ORDER BY SUM(s.SalesAmount) DESC
          ) AS rn
        FROM dbo.FactInternetSales s
        JOIN dbo.DimCustomer c ON s.CustomerKey = c.CustomerKey
        JOIN dbo.DimGeography g ON c.GeographyKey = g.GeographyKey
        JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
        WHERE YEAR(s.OrderDate) = 2013
        GROUP BY g.EnglishCountryRegionName, p.EnglishProductName
      )
      SELECT country, product, revenue
      FROM country_product
      WHERE rn = 1
      ORDER BY country
    difficulty: hard
    tags: [cte, window, multi_hop, ranking, trend, glossary_term]

  - id: hard_021
    question_vi: "Phân phối doanh thu theo nhóm thu nhập của khách hàng"
    question_en: "Revenue distribution by customer income bracket"
    gold_sql: |
      SELECT
        CASE
          WHEN c.YearlyIncome < 30000 THEN 'Low'
          WHEN c.YearlyIncome < 70000 THEN 'Medium'
          WHEN c.YearlyIncome < 100000 THEN 'High'
          ELSE 'Very High'
        END AS income_bracket,
        COUNT(DISTINCT c.CustomerKey) AS customers,
        SUM(s.SalesAmount) AS revenue,
        AVG(s.SalesAmount) AS avg_order
      FROM dbo.FactInternetSales s
      JOIN dbo.DimCustomer c ON s.CustomerKey = c.CustomerKey
      GROUP BY
        CASE
          WHEN c.YearlyIncome < 30000 THEN 'Low'
          WHEN c.YearlyIncome < 70000 THEN 'Medium'
          WHEN c.YearlyIncome < 100000 THEN 'High'
          ELSE 'Very High'
        END
      ORDER BY revenue DESC
    difficulty: hard
    tags: [aggregation, multi_hop, glossary_term]

  - id: hard_022
    question_vi: "Top 10 cặp sản phẩm thường được mua cùng nhau"
    question_en: "Top 10 product pairs frequently bought together"
    gold_sql: |
      SELECT TOP 10
        p1.EnglishProductName AS product1,
        p2.EnglishProductName AS product2,
        COUNT(*) AS co_occurrence
      FROM dbo.FactInternetSales s1
      JOIN dbo.FactInternetSales s2
        ON s1.SalesOrderNumber = s2.SalesOrderNumber
        AND s1.SalesOrderLineNumber < s2.SalesOrderLineNumber
      JOIN dbo.DimProduct p1 ON s1.ProductKey = p1.ProductKey
      JOIN dbo.DimProduct p2 ON s2.ProductKey = p2.ProductKey
      GROUP BY p1.EnglishProductName, p2.EnglishProductName
      ORDER BY co_occurrence DESC
    difficulty: hard
    tags: [multi_hop, aggregation, ranking]

  - id: hard_023
    question_vi: "Phân nhóm khách hàng theo Customer Lifetime Value (LTV)"
    question_en: "Customer LTV bucket distribution"
    gold_sql: |
      WITH cust_total AS (
        SELECT
          c.CustomerKey,
          SUM(s.SalesAmount) AS ltv
        FROM dbo.DimCustomer c
        LEFT JOIN dbo.FactInternetSales s ON c.CustomerKey = s.CustomerKey
        GROUP BY c.CustomerKey
      )
      SELECT
        CASE
          WHEN ltv IS NULL OR ltv = 0 THEN 'No purchase'
          WHEN ltv < 1000 THEN 'Low (<1K)'
          WHEN ltv < 5000 THEN 'Medium (1-5K)'
          WHEN ltv < 10000 THEN 'High (5-10K)'
          ELSE 'VIP (>=10K)'
        END AS ltv_bracket,
        COUNT(*) AS customers
      FROM cust_total
      GROUP BY
        CASE
          WHEN ltv IS NULL OR ltv = 0 THEN 'No purchase'
          WHEN ltv < 1000 THEN 'Low (<1K)'
          WHEN ltv < 5000 THEN 'Medium (1-5K)'
          WHEN ltv < 10000 THEN 'High (5-10K)'
          ELSE 'VIP (>=10K)'
        END
      ORDER BY customers DESC
    difficulty: hard
    tags: [cte, aggregation, glossary_term]

  - id: hard_024
    question_vi: "Tỷ lệ tăng trưởng doanh thu năm 2013 so với 2012 theo danh mục sản phẩm"
    question_en: "Revenue growth percentage 2013 vs 2012 by category"
    gold_sql: |
      WITH cat_yearly AS (
        SELECT
          pc.EnglishProductCategoryName AS category,
          YEAR(s.OrderDate) AS year,
          SUM(s.SalesAmount) AS revenue
        FROM dbo.FactInternetSales s
        JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
        JOIN dbo.DimProductSubcategory psc ON p.ProductSubcategoryKey = psc.ProductSubcategoryKey
        JOIN dbo.DimProductCategory pc ON psc.ProductCategoryKey = pc.ProductCategoryKey
        WHERE YEAR(s.OrderDate) IN (2012, 2013)
        GROUP BY pc.EnglishProductCategoryName, YEAR(s.OrderDate)
      ),
      pivoted AS (
        SELECT
          category,
          MAX(CASE WHEN year = 2012 THEN revenue ELSE 0 END) AS rev_2012,
          MAX(CASE WHEN year = 2013 THEN revenue ELSE 0 END) AS rev_2013
        FROM cat_yearly
        GROUP BY category
      )
      SELECT
        category,
        rev_2012,
        rev_2013,
        ROUND((rev_2013 - rev_2012) * 100.0 / NULLIF(rev_2012, 0), 2) AS growth_pct
      FROM pivoted
      ORDER BY growth_pct DESC
    difficulty: hard
    tags: [cte, multi_hop, aggregation, comparison, trend, glossary_term]

  - id: hard_025
    question_vi: "Khách hàng có doanh thu năm 2013 cao hơn năm 2012 ít nhất 50%"
    question_en: "Customers whose 2013 revenue exceeded 2012 revenue by at least 50%"
    gold_sql: |
      WITH yearly_revenue AS (
        SELECT
          c.CustomerKey,
          c.FirstName + ' ' + c.LastName AS customer_name,
          YEAR(s.OrderDate) AS year,
          SUM(s.SalesAmount) AS revenue
        FROM dbo.DimCustomer c
        JOIN dbo.FactInternetSales s ON c.CustomerKey = s.CustomerKey
        WHERE YEAR(s.OrderDate) IN (2012, 2013)
        GROUP BY c.CustomerKey, c.FirstName, c.LastName, YEAR(s.OrderDate)
      ),
      pivoted AS (
        SELECT
          CustomerKey,
          MAX(customer_name) AS customer_name,
          SUM(CASE WHEN year = 2012 THEN revenue ELSE 0 END) AS rev_2012,
          SUM(CASE WHEN year = 2013 THEN revenue ELSE 0 END) AS rev_2013
        FROM yearly_revenue
        GROUP BY CustomerKey
      )
      SELECT customer_name, rev_2012, rev_2013, rev_2013 - rev_2012 AS growth
      FROM pivoted
      WHERE rev_2012 > 0 AND rev_2013 >= rev_2012 * 1.5
      ORDER BY growth DESC
    difficulty: hard
    tags: [cte, comparison, multi_hop, trend, glossary_term]

  - id: hard_026
    question_vi: "Thu nhập trung vị của khách hàng theo từng quốc gia"
    question_en: "Median customer income by country"
    gold_sql: |
      SELECT DISTINCT
        g.EnglishCountryRegionName AS country,
        PERCENTILE_CONT(0.5) WITHIN GROUP (ORDER BY c.YearlyIncome)
          OVER (PARTITION BY g.EnglishCountryRegionName) AS median_income
      FROM dbo.DimCustomer c
      JOIN dbo.DimGeography g ON c.GeographyKey = g.GeographyKey
      ORDER BY median_income DESC
    difficulty: hard
    tags: [window, multi_hop, aggregation]

  - id: hard_027
    question_vi: "Đại lý có doanh thu cao hơn trung bình của loại business của họ"
    question_en: "Resellers with revenue above the average of their business type"
    gold_sql: |
      WITH reseller_total AS (
        SELECT
          r.ResellerKey,
          r.ResellerName,
          r.BusinessType,
          SUM(rs.SalesAmount) AS revenue
        FROM dbo.DimReseller r
        JOIN dbo.FactResellerSales rs ON r.ResellerKey = rs.ResellerKey
        GROUP BY r.ResellerKey, r.ResellerName, r.BusinessType
      ),
      type_avg AS (
        SELECT BusinessType, AVG(revenue) AS avg_rev
        FROM reseller_total
        GROUP BY BusinessType
      )
      SELECT rt.ResellerName, rt.BusinessType, rt.revenue, ta.avg_rev
      FROM reseller_total rt
      JOIN type_avg ta ON rt.BusinessType = ta.BusinessType
      WHERE rt.revenue > ta.avg_rev
      ORDER BY rt.BusinessType, rt.revenue DESC
    difficulty: hard
    tags: [cte, comparison, aggregation, multi_hop, glossary_term]

  - id: hard_028
    question_vi: "Doanh thu cộng dồn của top 5 sản phẩm theo từng tháng năm 2013"
    question_en: "Cumulative monthly revenue for top 5 products in 2013"
    gold_sql: |
      WITH product_monthly AS (
        SELECT
          p.EnglishProductName AS product,
          MONTH(s.OrderDate) AS month,
          SUM(s.SalesAmount) AS revenue
        FROM dbo.FactInternetSales s
        JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
        WHERE YEAR(s.OrderDate) = 2013
        GROUP BY p.EnglishProductName, MONTH(s.OrderDate)
      ),
      product_total AS (
        SELECT
          product,
          SUM(revenue) AS total_rev,
          RANK() OVER (ORDER BY SUM(revenue) DESC) AS r
        FROM product_monthly
        GROUP BY product
      )
      SELECT
        pm.product,
        pm.month,
        pm.revenue,
        SUM(pm.revenue) OVER (PARTITION BY pm.product ORDER BY pm.month) AS cumulative
      FROM product_monthly pm
      JOIN product_total pt ON pm.product = pt.product
      WHERE pt.r <= 5
      ORDER BY pm.product, pm.month
    difficulty: hard
    tags: [cte, window, multi_hop, ranking, trend, glossary_term]

  - id: hard_029
    question_vi: "Khách hàng đầu tiên và cuối cùng đặt hàng trong từng quốc gia"
    question_en: "First and last customer to place an order in each country"
    gold_sql: |
      WITH cust_orders AS (
        SELECT
          g.EnglishCountryRegionName AS country,
          c.FirstName + ' ' + c.LastName AS customer,
          s.OrderDate,
          ROW_NUMBER() OVER (
            PARTITION BY g.EnglishCountryRegionName
            ORDER BY s.OrderDate ASC
          ) AS first_rn,
          ROW_NUMBER() OVER (
            PARTITION BY g.EnglishCountryRegionName
            ORDER BY s.OrderDate DESC
          ) AS last_rn
        FROM dbo.FactInternetSales s
        JOIN dbo.DimCustomer c ON s.CustomerKey = c.CustomerKey
        JOIN dbo.DimGeography g ON c.GeographyKey = g.GeographyKey
      )
      SELECT
        country,
        MIN(CASE WHEN first_rn = 1 THEN customer END) AS first_customer,
        MIN(CASE WHEN first_rn = 1 THEN OrderDate END) AS first_order_date,
        MIN(CASE WHEN last_rn = 1 THEN customer END) AS last_customer,
        MIN(CASE WHEN last_rn = 1 THEN OrderDate END) AS last_order_date
      FROM cust_orders
      GROUP BY country
      ORDER BY country
    difficulty: hard
    tags: [cte, window, multi_hop, comparison]

  - id: hard_030
    question_vi: "Top 10 khách hàng có giá trị đơn trung bình cao nhất, có ít nhất 2 đơn"
    question_en: "Top 10 customers by average order value, with at least 2 orders"
    gold_sql: |
      WITH cust_stats AS (
        SELECT
          c.CustomerKey,
          c.FirstName + ' ' + c.LastName AS customer_name,
          COUNT(DISTINCT s.SalesOrderNumber) AS order_count,
          AVG(s.SalesAmount) AS avg_order_value
        FROM dbo.FactInternetSales s
        JOIN dbo.DimCustomer c ON s.CustomerKey = c.CustomerKey
        GROUP BY c.CustomerKey, c.FirstName, c.LastName
      )
      SELECT TOP 10 customer_name, order_count, avg_order_value
      FROM cust_stats
      WHERE order_count >= 2
      ORDER BY avg_order_value DESC
    difficulty: hard
    tags: [cte, ranking, aggregation, filtering, multi_hop, glossary_term]
