  - name: DiscountAmount
    display_name: Discount Amount
    type: decimal
    description: Discount amount (USD)
    examples:
    - 0.0
    range:
    - 0.0
    - 0.0
  - name: ProductStandardCost
    display_name: Manufacturing Cost
    type: decimal
    description: Standard manufacturing cost (USD)
    examples:
    - 0.8565
    - 1.4923
    - 1.8663
    range:
    - 0.8565
    - 2171.2942
  - name: TotalProductCost
    display_name: Total Product Cost
    type: decimal
    description: Total product cost (USD)
