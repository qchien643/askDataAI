  # ═══════════════════════════════════════════════════════════
  # HARD (30 samples) — multi-hop, CTE, window, set ops
  # ═══════════════════════════════════════════════════════════

  - id: hard_001
    question_vi: "Khách hàng có tổng doanh thu trong quý 1 năm 2013 cao hơn doanh thu trung bình của khu vực họ"
    question_en: "Customers whose Q1 2013 revenue exceeds the average revenue in their territory"
    gold_sql: |
      WITH cust_territory AS (
        SELECT c.CustomerKey, g.SalesTerritoryKey
        FROM dbo.DimCustomer c
        JOIN dbo.DimGeography g ON c.GeographyKey = g.GeographyKey
      ),
      cust_revenue AS (
        SELECT
          ct.CustomerKey,
          ct.SalesTerritoryKey,
          SUM(s.SalesAmount) AS revenue
        FROM dbo.FactInternetSales s
        JOIN cust_territory ct ON s.CustomerKey = ct.CustomerKey
        WHERE YEAR(s.OrderDate) = 2013
          AND MONTH(s.OrderDate) BETWEEN 1 AND 3
        GROUP BY ct.CustomerKey, ct.SalesTerritoryKey
      ),
      region_avg AS (
        SELECT
          SalesTerritoryKey,
          AVG(revenue) AS avg_revenue
        FROM cust_revenue
        GROUP BY SalesTerritoryKey
      )
      SELECT
        cr.CustomerKey,
        cr.revenue,
        ra.avg_revenue
      FROM cust_revenue cr
      JOIN region_avg ra ON cr.SalesTerritoryKey = ra.SalesTerritoryKey
      WHERE cr.revenue > ra.avg_revenue
      ORDER BY cr.revenue DESC
    difficulty: hard
    tags: [cte, multi_hop, comparison, aggregation, glossary_term]

  - id: hard_002
    question_vi: "Xếp hạng các sản phẩm theo doanh thu trong từng danh mục"
    question_en: "Rank products by revenue within each category"
    gold_sql: |
      SELECT
        pc.EnglishProductCategoryName AS category,
        p.EnglishProductName AS product,
        SUM(s.SalesAmount) AS revenue,
        ROW_NUMBER() OVER (
          PARTITION BY pc.ProductCategoryKey
          ORDER BY SUM(s.SalesAmount) DESC
        ) AS rank_in_category
      FROM dbo.FactInternetSales s
      JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
      JOIN dbo.DimProductSubcategory psc ON p.ProductSubcategoryKey = psc.ProductSubcategoryKey
      JOIN dbo.DimProductCategory pc ON psc.ProductCategoryKey = pc.ProductCategoryKey
      GROUP BY pc.ProductCategoryKey, pc.EnglishProductCategoryName, p.EnglishProductName
    difficulty: hard
    tags: [window, multi_hop, aggregation, glossary_term]

  - id: hard_003
    question_vi: "Top 3 sản phẩm có doanh thu cao nhất trong mỗi danh mục"
    question_en: "Top 3 products by revenue within each category"
    gold_sql: |
      WITH ranked_products AS (
        SELECT
          pc.EnglishProductCategoryName AS category,
          p.EnglishProductName AS product,
          SUM(s.SalesAmount) AS revenue,
          ROW_NUMBER() OVER (
            PARTITION BY pc.ProductCategoryKey
            ORDER BY SUM(s.SalesAmount) DESC
          ) AS rn
        FROM dbo.FactInternetSales s
        JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
        JOIN dbo.DimProductSubcategory psc ON p.ProductSubcategoryKey = psc.ProductSubcategoryKey
        JOIN dbo.DimProductCategory pc ON psc.ProductCategoryKey = pc.ProductCategoryKey
        GROUP BY pc.ProductCategoryKey, pc.EnglishProductCategoryName, p.EnglishProductName
      )
      SELECT category, product, revenue
      FROM ranked_products
      WHERE rn <= 3
      ORDER BY category, revenue DESC
    difficulty: hard
    tags: [cte, window, multi_hop, ranking, glossary_term]

  - id: hard_004
    question_vi: "Khách hàng đã mua hàng năm 2012 nhưng không mua năm 2013"
    question_en: "Customers who bought in 2012 but not in 2013"
    gold_sql: |
      SELECT
        c.CustomerKey,
        c.FirstName,
        c.LastName,
        c.EmailAddress
      FROM dbo.DimCustomer c
      WHERE EXISTS (
        SELECT 1
        FROM dbo.FactInternetSales s
        WHERE s.CustomerKey = c.CustomerKey
          AND YEAR(s.OrderDate) = 2012
      )
      AND NOT EXISTS (
        SELECT 1
        FROM dbo.FactInternetSales s
        WHERE s.CustomerKey = c.CustomerKey
          AND YEAR(s.OrderDate) = 2013
      )
      ORDER BY c.CustomerKey
    difficulty: hard
    tags: [nested, comparison, filtering]

  - id: hard_005
    question_vi: "Tăng trưởng doanh thu từng tháng so với tháng trước trong năm 2013"
    question_en: "Month-over-month revenue growth in 2013"
    gold_sql: |
      WITH monthly AS (
        SELECT
          MONTH(OrderDate) AS month,
          SUM(SalesAmount) AS revenue
        FROM dbo.FactInternetSales
        WHERE YEAR(OrderDate) = 2013
        GROUP BY MONTH(OrderDate)
      )
      SELECT
        month,
        revenue,
        LAG(revenue) OVER (ORDER BY month) AS prev_month_revenue,
        revenue - LAG(revenue) OVER (ORDER BY month) AS mom_growth
      FROM monthly
      ORDER BY month
    difficulty: hard
    tags: [cte, window, trend, comparison, glossary_term]

  - id: hard_006
    question_vi: "Top 5 khách hàng có doanh thu cao nhất trong mỗi quốc gia"
    question_en: "Top 5 customers by revenue within each country"
    gold_sql: |
      WITH cust_revenue AS (
        SELECT
          c.CustomerKey,
          c.FirstName + ' ' + c.LastName AS customer_name,
