    display_name: Promotion Key
    type: integer
    description: Promotion identifier (PK)
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 16
  - name: PromotionAlternateKey
    display_name: Alternate Promotion Key
    type: integer
    description: Alternate promotion identifier
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 16
  - name: EnglishPromotionName
    display_name: Promotion Name
