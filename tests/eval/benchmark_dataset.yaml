# Benchmark dataset for askDataAI Text-to-SQL pipeline
# Target DB: AdventureWorksDW2025
# Manifest:  configs/models.yaml
#
# Each sample:
#   id           - stable identifier (used for tracking across runs)
#   question_vi  - Vietnamese question (input to pipeline)
#   question_en  - English reference (for documentation only)
#   gold_sql     - canonical SQL using PHYSICAL names (dbo.DimCustomer, etc.)
#                  Runs DIRECTLY on AdventureWorks engine via benchmark_runner.
#   difficulty   - easy / medium / hard
#   tags         - aggregation, ranking, trend, comparison, filtering,
#                  multi_hop, nested, window, cte, glossary_term
#   notes        - optional clarification
#
# Distribution: 100 examples (30 easy + 40 medium + 30 hard)

version: "1.0"
target_db: AdventureWorksDW2025
manifest_ref: configs/models.yaml
data_window: "Most data falls in 2013 (52801 orders); 2014 only has January"

examples:

  # ═══════════════════════════════════════════════════════════
  # EASY (30 samples) — single-table or simple aggregations
  # ═══════════════════════════════════════════════════════════

  - id: easy_001
    question_vi: "Có bao nhiêu khách hàng trong hệ thống?"
    question_en: "How many customers are in the system?"
    gold_sql: |
      SELECT COUNT(*) AS total_customers
      FROM dbo.DimCustomer
    difficulty: easy
    tags: [aggregation]

  - id: easy_002
    question_vi: "Liệt kê 10 sản phẩm có giá niêm yết cao nhất"
    question_en: "List the top 10 products by list price"
    gold_sql: |
      SELECT TOP 10 EnglishProductName, ListPrice
      FROM dbo.DimProduct
      ORDER BY ListPrice DESC
    difficulty: easy
    tags: [ranking]

  - id: easy_003
    question_vi: "Sản phẩm màu đỏ có những mẫu nào?"
    question_en: "Which products come in red color?"
    gold_sql: |
      SELECT EnglishProductName, ListPrice, Color
      FROM dbo.DimProduct
      WHERE Color = 'Red'
      ORDER BY EnglishProductName
    difficulty: easy
    tags: [filtering]

  - id: easy_004
    question_vi: "Tổng doanh thu từ kênh bán online là bao nhiêu?"
    question_en: "What is the total revenue from internet sales?"
    gold_sql: |
      SELECT SUM(SalesAmount) AS total_revenue
      FROM dbo.FactInternetSales
    difficulty: easy
    tags: [aggregation, glossary_term]
    notes: "Uses 'doanh thu' from glossary -> SUM(SalesAmount)"

  - id: easy_005
    question_vi: "Khách hàng nữ có thu nhập trên 100000 USD"
    question_en: "Female customers with yearly income above 100000 USD"
    gold_sql: |
      SELECT FirstName, LastName, YearlyIncome
      FROM dbo.DimCustomer
      WHERE Gender = 'F' AND YearlyIncome > 100000
      ORDER BY YearlyIncome DESC
    difficulty: easy
    tags: [filtering]

  - id: easy_006
    question_vi: "Số lượng đơn hàng theo từng năm"
    question_en: "Number of orders per year"
    gold_sql: |
      SELECT
        YEAR(OrderDate) AS order_year,
        COUNT(DISTINCT SalesOrderNumber) AS order_count
      FROM dbo.FactInternetSales
      GROUP BY YEAR(OrderDate)
      ORDER BY order_year
    difficulty: easy
    tags: [aggregation, trend, glossary_term]
    notes: "Uses 'số lượng đơn hàng' from glossary -> COUNT(DISTINCT SalesOrderNumber)"

  - id: easy_007
    question_vi: "Tổng số sản phẩm trong catalog?"
    question_en: "How many products in catalog?"
    gold_sql: |
      SELECT COUNT(*) AS total_products
      FROM dbo.DimProduct
    difficulty: easy
    tags: [aggregation]

  - id: easy_008
    question_vi: "Có bao nhiêu đại lý trong hệ thống?"
    question_en: "How many resellers in the system?"
    gold_sql: |
      SELECT COUNT(*) AS total_resellers
      FROM dbo.DimReseller
    difficulty: easy
    tags: [aggregation]

  - id: easy_009
    question_vi: "Liệt kê 5 sản phẩm có giá thấp nhất, loại trừ giá 0"
    question_en: "Top 5 cheapest products, excluding price 0"
    gold_sql: |
      SELECT TOP 5 EnglishProductName, ListPrice
      FROM dbo.DimProduct
      WHERE ListPrice > 0
      ORDER BY ListPrice ASC
    difficulty: easy
    tags: [ranking, filtering]

  - id: easy_010
    question_vi: "Sản phẩm có chi phí sản xuất cao nhất là gì?"
    question_en: "Which product has the highest manufacturing cost?"
    gold_sql: |
      SELECT TOP 1 EnglishProductName, StandardCost
      FROM dbo.DimProduct
      ORDER BY StandardCost DESC
    difficulty: easy
    tags: [ranking]

  - id: easy_011
    question_vi: "Số con tối đa của một khách hàng là bao nhiêu?"
    question_en: "What is the maximum number of children for a customer?"
    gold_sql: |
      SELECT MAX(TotalChildren) AS max_children
      FROM dbo.DimCustomer
    difficulty: easy
    tags: [aggregation]

  - id: easy_012
    question_vi: "Liệt kê các khách hàng có 5 con trở lên"
    question_en: "List customers with 5 or more children"
    gold_sql: |
      SELECT FirstName, LastName, TotalChildren
      FROM dbo.DimCustomer
      WHERE TotalChildren >= 5
      ORDER BY TotalChildren DESC
    difficulty: easy
    tags: [filtering]

  - id: easy_013
    question_vi: "Đếm số khách hàng theo giới tính"
    question_en: "Count customers by gender"
    gold_sql: |
      SELECT Gender, COUNT(*) AS customer_count
      FROM dbo.DimCustomer
      GROUP BY Gender
      ORDER BY Gender
    difficulty: easy
    tags: [aggregation]

  - id: easy_014
    question_vi: "Đếm số khách hàng theo trình độ học vấn"
    question_en: "Count customers by education level"
    gold_sql: |
      SELECT EnglishEducation, COUNT(*) AS customer_count
      FROM dbo.DimCustomer
      WHERE EnglishEducation IS NOT NULL
      GROUP BY EnglishEducation
      ORDER BY customer_count DESC
    difficulty: easy
    tags: [aggregation]

  - id: easy_015
    question_vi: "Sản phẩm có size 'L' có những loại nào?"
    question_en: "Which products come in size L?"
    gold_sql: |
      SELECT EnglishProductName, Size, Color
      FROM dbo.DimProduct
      WHERE Size = 'L'
      ORDER BY EnglishProductName
    difficulty: easy
    tags: [filtering]

  - id: easy_016
    question_vi: "Giá niêm yết trung bình của tất cả sản phẩm là bao nhiêu?"
    question_en: "What is the average list price of all products?"
    gold_sql: |
      SELECT AVG(ListPrice) AS avg_list_price
      FROM dbo.DimProduct
      WHERE ListPrice > 0
    difficulty: easy
    tags: [aggregation]

  - id: easy_017
    question_vi: "Đại lý nào có nhiều nhân viên nhất?"
    question_en: "Which reseller has the most employees?"
    gold_sql: |
      SELECT TOP 1 ResellerName, NumberEmployees
      FROM dbo.DimReseller
      ORDER BY NumberEmployees DESC
    difficulty: easy
    tags: [ranking]

  - id: easy_018
    question_vi: "Tổng số đơn hàng online là bao nhiêu?"
    question_en: "What is the total number of internet orders?"
    gold_sql: |
      SELECT COUNT(DISTINCT SalesOrderNumber) AS total_orders
      FROM dbo.FactInternetSales
    difficulty: easy
    tags: [aggregation, glossary_term]

  - id: easy_019
    question_vi: "Có bao nhiêu sản phẩm đã được bán online (đếm distinct)?"
    question_en: "How many distinct products have been sold online?"
    gold_sql: |
      SELECT COUNT(DISTINCT ProductKey) AS products_sold
      FROM dbo.FactInternetSales
    difficulty: easy
    tags: [aggregation]

  - id: easy_020
    question_vi: "Doanh thu trung bình mỗi đơn hàng là bao nhiêu?"
    question_en: "What is the average revenue per order line?"
    gold_sql: |
      SELECT AVG(SalesAmount) AS avg_order_amount
      FROM dbo.FactInternetSales
    difficulty: easy
    tags: [aggregation, glossary_term]

  - id: easy_021
    question_vi: "Tổng số tiền thuế đã thu là bao nhiêu?"
    question_en: "What is the total tax amount collected?"
    gold_sql: |
      SELECT SUM(TaxAmt) AS total_tax
      FROM dbo.FactInternetSales
    difficulty: easy
    tags: [aggregation]

  - id: easy_022
    question_vi: "Có bao nhiêu khu vực bán hàng trong hệ thống?"
    question_en: "How many sales territories?"
    gold_sql: |
      SELECT COUNT(*) AS total_territories
      FROM dbo.DimSalesTerritory
    difficulty: easy
    tags: [aggregation]

  - id: easy_023
    question_vi: "Liệt kê tất cả các quốc gia trong bảng địa lý"
    question_en: "List all distinct countries in the geography table"
    gold_sql: |
      SELECT DISTINCT EnglishCountryRegionName
      FROM dbo.DimGeography
      ORDER BY EnglishCountryRegionName
    difficulty: easy
    tags: [filtering]

  - id: easy_024
    question_vi: "Khách hàng nào sinh năm 1970?"
    question_en: "Customers born in 1970"
    gold_sql: |
      SELECT FirstName, LastName, BirthDate
      FROM dbo.DimCustomer
      WHERE YEAR(BirthDate) = 1970
      ORDER BY BirthDate
    difficulty: easy
    tags: [filtering]

  - id: easy_025
    question_vi: "Đếm số đơn hàng theo từng tháng năm 2013"
    question_en: "Count orders by month in 2013"
    gold_sql: |
      SELECT
        MONTH(OrderDate) AS month,
        COUNT(DISTINCT SalesOrderNumber) AS orders
      FROM dbo.FactInternetSales
      WHERE YEAR(OrderDate) = 2013
      GROUP BY MONTH(OrderDate)
      ORDER BY month
    difficulty: easy
    tags: [aggregation, trend, glossary_term]

  - id: easy_026
    question_vi: "Loại promotion nào có nhiều chương trình nhất?"
    question_en: "Which promotion type has the most programs?"
    gold_sql: |
      SELECT EnglishPromotionType, COUNT(*) AS promotion_count
      FROM dbo.DimPromotion
      GROUP BY EnglishPromotionType
      ORDER BY promotion_count DESC
    difficulty: easy
    tags: [aggregation, ranking]

  - id: easy_027
    question_vi: "Liệt kê các loại business của đại lý"
    question_en: "List distinct reseller business types"
    gold_sql: |
      SELECT DISTINCT BusinessType
      FROM dbo.DimReseller
      WHERE BusinessType IS NOT NULL
      ORDER BY BusinessType
    difficulty: easy
    tags: [filtering]

  - id: easy_028
    question_vi: "Liệt kê tên các subcategory sản phẩm"
    question_en: "List all product subcategory names"
    gold_sql: |
      SELECT DISTINCT EnglishProductSubcategoryName
      FROM dbo.DimProductSubcategory
      ORDER BY EnglishProductSubcategoryName
    difficulty: easy
    tags: [filtering]

  - id: easy_029
    question_vi: "Loại tiền tệ nào được hệ thống hỗ trợ?"
    question_en: "Which currencies does the system support?"
    gold_sql: |
      SELECT DISTINCT CurrencyName
      FROM dbo.DimCurrency
      ORDER BY CurrencyName
    difficulty: easy
    tags: [filtering]

  - id: easy_030
    question_vi: "Tổng số đơn hàng đại lý là bao nhiêu?"
    question_en: "What is the total number of reseller orders?"
    gold_sql: |
      SELECT COUNT(DISTINCT SalesOrderNumber) AS total_reseller_orders
      FROM dbo.FactResellerSales
    difficulty: easy
    tags: [aggregation, glossary_term]

  # ═══════════════════════════════════════════════════════════
  # MEDIUM (40 samples) — joins, GROUP BY, time-based, HAVING
  # ═══════════════════════════════════════════════════════════

  - id: medium_001
    question_vi: "Top 5 sản phẩm có doanh thu cao nhất quý 1 năm 2013"
    question_en: "Top 5 products by revenue in Q1 2013"
    gold_sql: |
      SELECT TOP 5
        p.EnglishProductName,
        SUM(s.SalesAmount) AS revenue
      FROM dbo.FactInternetSales s
      JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
      WHERE YEAR(s.OrderDate) = 2013
        AND MONTH(s.OrderDate) BETWEEN 1 AND 3
      GROUP BY p.EnglishProductName
      ORDER BY revenue DESC
    difficulty: medium
    tags: [ranking, aggregation, trend, glossary_term]

  - id: medium_002
    question_vi: "Doanh thu theo từng tháng trong năm 2013"
    question_en: "Monthly revenue in 2013"
    gold_sql: |
      SELECT
        MONTH(OrderDate) AS month,
        SUM(SalesAmount) AS revenue
      FROM dbo.FactInternetSales
      WHERE YEAR(OrderDate) = 2013
      GROUP BY MONTH(OrderDate)
      ORDER BY month
    difficulty: medium
    tags: [aggregation, trend, glossary_term]

  - id: medium_003
    question_vi: "Số đơn hàng theo từng khu vực bán hàng, sắp xếp giảm dần"
    question_en: "Order count by sales territory, sorted descending"
    gold_sql: |
      SELECT
        t.SalesTerritoryRegion AS region,
        COUNT(DISTINCT s.SalesOrderNumber) AS order_count
      FROM dbo.FactInternetSales s
      JOIN dbo.DimCustomer c ON s.CustomerKey = c.CustomerKey
      JOIN dbo.DimGeography g ON c.GeographyKey = g.GeographyKey
      JOIN dbo.DimSalesTerritory t ON g.SalesTerritoryKey = t.SalesTerritoryKey
      GROUP BY t.SalesTerritoryRegion
      ORDER BY order_count DESC
    difficulty: medium
    tags: [aggregation, multi_hop, glossary_term]

  - id: medium_004
    question_vi: "Thu nhập trung bình của khách hàng theo nghề nghiệp"
    question_en: "Average customer income by occupation"
    gold_sql: |
      SELECT
        EnglishOccupation AS occupation,
        AVG(YearlyIncome) AS avg_income,
        COUNT(*) AS customer_count
      FROM dbo.DimCustomer
      WHERE EnglishOccupation IS NOT NULL
      GROUP BY EnglishOccupation
      ORDER BY avg_income DESC
    difficulty: medium
    tags: [aggregation, ranking]

  - id: medium_005
    question_vi: "Doanh thu theo từng danh mục sản phẩm"
    question_en: "Revenue by product category"
    gold_sql: |
      SELECT
        pc.EnglishProductCategoryName AS category,
        SUM(s.SalesAmount) AS revenue
      FROM dbo.FactInternetSales s
      JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
      JOIN dbo.DimProductSubcategory psc ON p.ProductSubcategoryKey = psc.ProductSubcategoryKey
      JOIN dbo.DimProductCategory pc ON psc.ProductCategoryKey = pc.ProductCategoryKey
      GROUP BY pc.EnglishProductCategoryName
      ORDER BY revenue DESC
    difficulty: medium
    tags: [aggregation, multi_hop, glossary_term]

  - id: medium_006
    question_vi: "Quốc gia nào có nhiều hơn 1000 khách hàng?"
    question_en: "Which countries have more than 1000 customers?"
    gold_sql: |
      SELECT
        g.EnglishCountryRegionName AS country,
        COUNT(*) AS customer_count
      FROM dbo.DimCustomer c
      JOIN dbo.DimGeography g ON c.GeographyKey = g.GeographyKey
      GROUP BY g.EnglishCountryRegionName
      HAVING COUNT(*) > 1000
      ORDER BY customer_count DESC
    difficulty: medium
    tags: [aggregation, filtering, multi_hop]

  - id: medium_007
    question_vi: "Top 5 đại lý có doanh thu cao nhất"
    question_en: "Top 5 resellers by revenue"
    gold_sql: |
      SELECT TOP 5
        r.ResellerName,
        SUM(rs.SalesAmount) AS revenue
      FROM dbo.FactResellerSales rs
      JOIN dbo.DimReseller r ON rs.ResellerKey = r.ResellerKey
      GROUP BY r.ResellerName
      ORDER BY revenue DESC
    difficulty: medium
    tags: [ranking, aggregation, glossary_term]

  - id: medium_008
    question_vi: "Sản phẩm có giá niêm yết cao hơn giá trung bình"
    question_en: "Products with list price above the average"
    gold_sql: |
      SELECT EnglishProductName, ListPrice
      FROM dbo.DimProduct
      WHERE ListPrice > (
        SELECT AVG(ListPrice)
        FROM dbo.DimProduct
        WHERE ListPrice > 0
      )
      ORDER BY ListPrice DESC
    difficulty: medium
    tags: [filtering, nested]

  - id: medium_009
    question_vi: "Top 10 khách hàng có tổng doanh thu cao nhất năm 2013"
    question_en: "Top 10 customers by revenue in 2013"
    gold_sql: |
      SELECT TOP 10
        c.FirstName + ' ' + c.LastName AS customer_name,
        SUM(s.SalesAmount) AS revenue
      FROM dbo.FactInternetSales s
      JOIN dbo.DimCustomer c ON s.CustomerKey = c.CustomerKey
      WHERE YEAR(s.OrderDate) = 2013
      GROUP BY c.CustomerKey, c.FirstName, c.LastName
      ORDER BY revenue DESC
    difficulty: medium
    tags: [ranking, aggregation, trend, glossary_term, multi_hop]

  - id: medium_010
    question_vi: "Doanh thu theo từng quý của năm 2013"
    question_en: "Quarterly revenue in 2013"
    gold_sql: |
      SELECT
        DATEPART(QUARTER, OrderDate) AS quarter,
        SUM(SalesAmount) AS revenue
      FROM dbo.FactInternetSales
      WHERE YEAR(OrderDate) = 2013
      GROUP BY DATEPART(QUARTER, OrderDate)
      ORDER BY quarter
    difficulty: medium
    tags: [aggregation, trend, glossary_term]

  - id: medium_011
    question_vi: "Sản phẩm thuộc danh mục Bikes có doanh thu cao nhất"
    question_en: "Top-revenue product in Bikes category"
    gold_sql: |
      SELECT TOP 1
        p.EnglishProductName,
        SUM(s.SalesAmount) AS revenue
      FROM dbo.FactInternetSales s
      JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
      JOIN dbo.DimProductSubcategory psc ON p.ProductSubcategoryKey = psc.ProductSubcategoryKey
      JOIN dbo.DimProductCategory pc ON psc.ProductCategoryKey = pc.ProductCategoryKey
      WHERE pc.EnglishProductCategoryName = 'Bikes'
      GROUP BY p.EnglishProductName
      ORDER BY revenue DESC
    difficulty: medium
    tags: [ranking, aggregation, multi_hop, filtering, glossary_term]

  - id: medium_012
    question_vi: "Số đơn hàng theo từng promotion"
    question_en: "Order count by promotion"
    gold_sql: |
      SELECT
        pr.EnglishPromotionName AS promotion,
        COUNT(DISTINCT s.SalesOrderNumber) AS order_count
      FROM dbo.FactInternetSales s
      JOIN dbo.DimPromotion pr ON s.PromotionKey = pr.PromotionKey
      GROUP BY pr.EnglishPromotionName
      ORDER BY order_count DESC
    difficulty: medium
    tags: [aggregation, multi_hop, glossary_term]

  - id: medium_013
    question_vi: "Top 5 thành phố có nhiều khách hàng nhất"
    question_en: "Top 5 cities by customer count"
    gold_sql: |
      SELECT TOP 5
        g.City,
        COUNT(*) AS customer_count
      FROM dbo.DimCustomer c
      JOIN dbo.DimGeography g ON c.GeographyKey = g.GeographyKey
      GROUP BY g.City
      ORDER BY customer_count DESC
    difficulty: medium
    tags: [ranking, aggregation, multi_hop]

  - id: medium_014
    question_vi: "Doanh thu theo giới tính của khách hàng"
    question_en: "Revenue by customer gender"
    gold_sql: |
      SELECT
        c.Gender,
        SUM(s.SalesAmount) AS revenue
      FROM dbo.FactInternetSales s
      JOIN dbo.DimCustomer c ON s.CustomerKey = c.CustomerKey
      GROUP BY c.Gender
      ORDER BY revenue DESC
    difficulty: medium
    tags: [aggregation, multi_hop, glossary_term]

  - id: medium_015
    question_vi: "Khách hàng có thu nhập trên trung bình toàn hệ thống"
    question_en: "Customers with income above the system average"
    gold_sql: |
      SELECT FirstName, LastName, YearlyIncome
      FROM dbo.DimCustomer
      WHERE YearlyIncome > (SELECT AVG(YearlyIncome) FROM dbo.DimCustomer)
      ORDER BY YearlyIncome DESC
    difficulty: medium
    tags: [filtering, nested, comparison]

  - id: medium_016
    question_vi: "Đại lý kiểu Warehouse có hơn 50 nhân viên"
    question_en: "Warehouse-type resellers with more than 50 employees"
    gold_sql: |
      SELECT ResellerName, NumberEmployees, BusinessType
      FROM dbo.DimReseller
      WHERE NumberEmployees > 50 AND BusinessType = 'Warehouse'
      ORDER BY NumberEmployees DESC
    difficulty: medium
    tags: [filtering]

  - id: medium_017
    question_vi: "Tổng doanh thu theo từng quốc gia"
    question_en: "Total revenue by country"
    gold_sql: |
      SELECT
        g.EnglishCountryRegionName AS country,
        SUM(s.SalesAmount) AS revenue
      FROM dbo.FactInternetSales s
      JOIN dbo.DimCustomer c ON s.CustomerKey = c.CustomerKey
      JOIN dbo.DimGeography g ON c.GeographyKey = g.GeographyKey
      GROUP BY g.EnglishCountryRegionName
      ORDER BY revenue DESC
    difficulty: medium
    tags: [aggregation, multi_hop, glossary_term]

  - id: medium_018
    question_vi: "Tháng nào năm 2013 có doanh thu cao nhất?"
    question_en: "Which month in 2013 had the highest revenue?"
    gold_sql: |
      SELECT TOP 1
        MONTH(OrderDate) AS month,
        SUM(SalesAmount) AS revenue
      FROM dbo.FactInternetSales
      WHERE YEAR(OrderDate) = 2013
      GROUP BY MONTH(OrderDate)
      ORDER BY revenue DESC
    difficulty: medium
    tags: [ranking, aggregation, trend, glossary_term]

  - id: medium_019
    question_vi: "Số đại lý theo từng nhóm vùng"
    question_en: "Reseller count by territory group"
    gold_sql: |
      SELECT
        t.SalesTerritoryGroup AS region_group,
        COUNT(*) AS reseller_count
      FROM dbo.DimReseller r
      JOIN dbo.DimGeography g ON r.GeographyKey = g.GeographyKey
      JOIN dbo.DimSalesTerritory t ON g.SalesTerritoryKey = t.SalesTerritoryKey
      GROUP BY t.SalesTerritoryGroup
      ORDER BY reseller_count DESC
    difficulty: medium
    tags: [aggregation, multi_hop]

  - id: medium_020
    question_vi: "Top 5 sản phẩm bán nhiều số lượng nhất"
    question_en: "Top 5 products by order quantity"
    gold_sql: |
      SELECT TOP 5
        p.EnglishProductName,
        SUM(s.OrderQuantity) AS quantity_sold
      FROM dbo.FactInternetSales s
      JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
      GROUP BY p.EnglishProductName
      ORDER BY quantity_sold DESC
    difficulty: medium
    tags: [ranking, aggregation, multi_hop, glossary_term]

  - id: medium_021
    question_vi: "Doanh thu reseller theo từng năm"
    question_en: "Reseller revenue by year"
    gold_sql: |
      SELECT
        YEAR(OrderDate) AS year,
        SUM(SalesAmount) AS revenue
      FROM dbo.FactResellerSales
      GROUP BY YEAR(OrderDate)
      ORDER BY year
    difficulty: medium
    tags: [aggregation, trend, glossary_term]

  - id: medium_022
    question_vi: "Khách hàng có tổng doanh thu trên 10000 USD"
    question_en: "Customers with total revenue above 10000 USD"
    gold_sql: |
      SELECT
        c.FirstName + ' ' + c.LastName AS customer_name,
        SUM(s.SalesAmount) AS total_revenue
      FROM dbo.FactInternetSales s
      JOIN dbo.DimCustomer c ON s.CustomerKey = c.CustomerKey
      GROUP BY c.CustomerKey, c.FirstName, c.LastName
      HAVING SUM(s.SalesAmount) > 10000
      ORDER BY total_revenue DESC
    difficulty: medium
    tags: [aggregation, filtering, multi_hop, glossary_term]

  - id: medium_023
    question_vi: "Lợi nhuận theo từng danh mục sản phẩm"
    question_en: "Profit by product category"
    gold_sql: |
      SELECT
        pc.EnglishProductCategoryName AS category,
        SUM(s.SalesAmount) - SUM(s.TotalProductCost) AS profit
      FROM dbo.FactInternetSales s
      JOIN dbo.DimProduct p ON s.ProductKey = p.ProductKey
      JOIN dbo.DimProductSubcategory psc ON p.ProductSubcategoryKey = psc.ProductSubcategoryKey
      JOIN dbo.DimProductCategory pc ON psc.ProductCategoryKey = pc.ProductCategoryKey
      GROUP BY pc.EnglishProductCategoryName
      ORDER BY profit DESC
    difficulty: medium
    tags: [aggregation, multi_hop, glossary_term]

  - id: medium_024
    question_vi: "Top 10 đại lý theo doanh thu năm 2013"
    question_en: "Top 10 resellers by revenue in 2013"
    gold_sql: |
      SELECT TOP 10
        r.ResellerName,
