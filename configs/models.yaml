    examples:
    - SO43697
    - SO43698
    - SO43699
  - name: SalesOrderLineNumber
    display_name: Line Number
    type: integer
    description: Line item number within the order
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 8
  - name: RevisionNumber
    display_name: Revision Number
    type: integer
    description: Order revision number
    examples:
    - 1
    range:
    - 1
    - 1
  - name: OrderQuantity
    display_name: Order Quantity
    type: integer
    description: Quantity of products ordered
    examples:
    - 1
    range:
    - 1
    - 1
  - name: UnitPrice
    display_name: Unit Price
    type: decimal
    description: Unit price per product (USD)
    examples:
    - 2.29
    - 3.99
    - 4.99
    range:
    - 2.29
    - 3578.27
  - name: ExtendedAmount
    display_name: Total Amount
    type: decimal
    description: Extended amount = UnitPrice × OrderQuantity
    examples:
    - 2.29
    - 3.99
    - 4.99
    range:
    - 2.29
    - 3578.27
  - name: UnitPriceDiscountPct
    display_name: Discount Percentage
    type: decimal
