services:
  # ── Backend (FastAPI + Python) ──────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: askdataai-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # When running in Docker, SQL Server is on the HOST machine.
      # host.docker.internal resolves to the host on Linux/Mac/Windows.
      SQL_SERVER_HOST: ${SQL_SERVER_HOST:-host.docker.internal}
    extra_hosts:
      - "host.docker.internal:host-gateway"   # required on Linux
    volumes:
      - chroma_data:/app/chroma_data
      - ./manifests:/app/manifests
      - ./semantic_memory.json:/app/semantic_memory.json
      - ./glossary.yaml:/app/glossary.yaml
      - ./models.yaml:/app/models.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - askdataai

  # ── Frontend (Next.js) ──────────────────────────────────────────────────
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        # In Docker network, frontend calls backend via service name
        NEXT_PUBLIC_API_BASE: http://backend:8000
    container_name: askdataai-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - askdataai

# ── Named Volumes ───────────────────────────────────────────────────────
volumes:
  chroma_data:

# ── Networks ────────────────────────────────────────────────────────────
networks:
  askdataai:
    driver: bridge
