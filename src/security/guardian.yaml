# SQL Guardian Configuration
# Lấy ý tưởng từ WrenAI Data Security (RLS/CLS)

# Guard 2: Read-only mode (chỉ cho phép SELECT)
read_only: true

# Guard 1: SQL Injection blocked patterns (regex)
# NGUYÊN TẮC: chỉ block những pattern THỰC SỰ là injection attack.
# UNION ALL SELECT là SQL hợp lệ khi AI tự sinh — KHÔNG được block.
# Chỉ block khi có dấu hiệu context injection (dấu nháy, comment markers).
blocked_patterns:
  # DML chained sau dấu chấm phẩy (injection: '; DROP TABLE ...)
  - ";\\s*(DROP|DELETE|INSERT|UPDATE|ALTER|EXEC|TRUNCATE)"
  # Stored procs nguy hiểm của SQL Server
  - "xp_cmdshell"
  - "sp_executesql"
  # File I/O exploit (MySQL)
  - "INTO\\s+OUTFILE"
  - "LOAD_FILE\\s*\\("
  # Time-based blind injection
  - "BENCHMARK\\s*\\("
  - "SLEEP\\s*\\("
  - "WAITFOR\\s+DELAY"
  # Boolean-based injection (classic) — chỉ match khi có dấu nháy string
  - "'\\s*OR\\s+'?1'?\\s*=\\s*'?1"
  - "'\\s*AND\\s+'?1'?\\s*=\\s*'?1"

# Guard 4: Column masking (column_name -> SQL mask expression)
masked_columns:
  # Uncomment if your DB has sensitive columns:
  # password: "'***'"
  # ssn: "'***-**-' + RIGHT(ssn, 4)"
  # email: "LEFT(email, 2) + '***@***'"
  # phone: "'***-***-' + RIGHT(phone, 4)"
  # salary: "NULL"

# Guard 5: Row-Level Security policies
rls_policies: []
  # Example:
  # - name: "org_isolation"
  #   type: "rls"
  #   condition: "org_id = @user_org_id"
  #   applied_models: ["customers", "orders"]
  #   enabled: true
