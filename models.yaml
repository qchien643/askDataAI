# ─── RELATIONSHIPS ─────────────────────────────────────────────────────────

relationships:
  # Internet Sales
  - name: internet_sales_to_customer
    from: internet_sales
    to: customers
    type: MANY_TO_ONE
    condition: "internet_sales.CustomerKey = customers.CustomerKey"

  - name: internet_sales_to_product
    from: internet_sales
    to: products
    type: MANY_TO_ONE
    condition: "internet_sales.ProductKey = products.ProductKey"

  - name: internet_sales_to_order_date
    from: internet_sales
    to: dates
    type: MANY_TO_ONE
    condition: "internet_sales.OrderDateKey = dates.DateKey"

  - name: internet_sales_to_currency
    from: internet_sales
    to: currency
    type: MANY_TO_ONE
    condition: "internet_sales.CurrencyKey = currency.CurrencyKey"

  - name: internet_sales_to_promotion
    from: internet_sales
    to: promotions
    type: MANY_TO_ONE
    condition: "internet_sales.PromotionKey = promotions.PromotionKey"

  - name: internet_sales_to_territory
    from: internet_sales
    to: sales_territory
    type: MANY_TO_ONE
    condition: "internet_sales.SalesTerritoryKey = sales_territory.SalesTerritoryKey"

  # Reseller Sales
  - name: reseller_sales_to_product
    from: reseller_sales
    to: products
    type: MANY_TO_ONE
    condition: "reseller_sales.ProductKey = products.ProductKey"

  - name: reseller_sales_to_reseller
    from: reseller_sales
    to: resellers
    type: MANY_TO_ONE
    condition: "reseller_sales.ResellerKey = resellers.ResellerKey"

  - name: reseller_sales_to_order_date
    from: reseller_sales
    to: dates
    type: MANY_TO_ONE
    condition: "reseller_sales.OrderDateKey = dates.DateKey"

  - name: reseller_sales_to_currency
    from: reseller_sales
    to: currency
    type: MANY_TO_ONE
    condition: "reseller_sales.CurrencyKey = currency.CurrencyKey"

  - name: reseller_sales_to_promotion
    from: reseller_sales
    to: promotions
    type: MANY_TO_ONE
    condition: "reseller_sales.PromotionKey = promotions.PromotionKey"

  - name: reseller_sales_to_territory
    from: reseller_sales
    to: sales_territory
    type: MANY_TO_ONE
    condition: "reseller_sales.SalesTerritoryKey = sales_territory.SalesTerritoryKey"

  # Dimension relationships
  - name: customer_to_geography
    from: customers
    to: geography
    type: MANY_TO_ONE
    condition: "customers.GeographyKey = geography.GeographyKey"

  - name: geography_to_territory
    from: geography
    to: sales_territory
    type: MANY_TO_ONE
    condition: "geography.SalesTerritoryKey = sales_territory.SalesTerritoryKey"

  - name: product_to_subcategory
    from: products
    to: product_subcategories
    type: MANY_TO_ONE
    condition: "products.ProductSubcategoryKey = product_subcategories.ProductSubcategoryKey"

  - name: subcategory_to_category
    from: product_subcategories
    to: product_categories
    type: MANY_TO_ONE
    condition: "product_subcategories.ProductCategoryKey = product_categories.ProductCategoryKey"

  - name: reseller_to_geography
    from: resellers
    to: geography
    type: MANY_TO_ONE
    condition: "resellers.GeographyKey = geography.GeographyKey"
