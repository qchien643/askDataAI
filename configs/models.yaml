models:
- name: customers
  table: dbo.DimCustomer
  description: 'Individual customer information. Each row represents one customer, including name, email, birth date, income, occupation, and address.'
  primary_key: CustomerKey
  columns:
  - name: CustomerKey
    display_name: Customer ID
    type: integer
    description: Customer identifier (PK, used to join with sales tables)
    examples:
    - 11000
    - 11001
    - 11002
    range:
    - 11000
    - 29483
  - name: GeographyKey
    display_name: Geography Key
    type: integer
    description: FK to geography table (customer geographic location)
    examples:
    - 2
    - 3
    - 4
    range:
    - 2
    - 654
    foreign_key: geography.GeographyKey
  - name: CustomerAlternateKey
    display_name: Alternate Customer ID
    type: string
    description: Alternate customer identifier (business key)
    examples:
    - AW00011000
    - AW00011001
    - AW00011002
  - name: Title
    display_name: Title
    type: string
    description: 'Title: Mr., Mrs., Ms.'
    examples:
    - Mr.
    - Mrs.
    - Ms
  - name: FirstName
    display_name: First Name
    type: string
    description: Customer first name
    examples:
    - Aaron
    - Abby
    - Abhijit
  - name: MiddleName
    display_name: Middle Name
    type: string
    description: Customer middle name
    examples:
    - A
    - A.
    - B
  - name: LastName
    display_name: Last Name
    type: string
    description: Customer last name
    examples:
    - Adams
    - Agbonile
    - Alan
  - name: BirthDate
    display_name: Birth Date
    type: date
    description: Customer birth date
    examples:
    - '1916-02-10'
    - '1917-02-09'
    - '1917-06-05'
    range:
    - '1916-02-10'
    - '1986-06-25'
  - name: MaritalStatus
    display_name: Marital Status
    type: string
    description: 'Marital status: S = Single, M = Married'
    examples:
    - M
    - S
  - name: Gender
    display_name: Gender
    type: string
    description: 'Gender: M = Male, F = Female'
    examples:
    - F
    - M
  - name: EmailAddress
    display_name: Email
    type: string
    description: Email address
    examples:
    - aaron10@adventure-works.com
    - aaron11@adventure-works.com
    - aaron12@adventure-works.com
  - name: YearlyIncome
    display_name: Yearly Income
    type: decimal
    description: Annual income (USD)
    examples:
    - 10000.0
    - 20000.0
    - 30000.0
    range:
    - 10000.0
    - 170000.0
  - name: TotalChildren
    display_name: Total Children
    type: integer
    description: Total number of children
    examples:
    - 0
    - 1
    - 2
    range:
    - 0
    - 5
  - name: EnglishEducation
    display_name: Education
    type: string
    description: 'Education level: Bachelors, Graduate Degree, High School, Partial College, Partial High School'
    examples:
    - Bachelors
    - Graduate Degree
    - High School
  - name: EnglishOccupation
    display_name: Occupation
    type: string
    description: 'Occupation: Professional, Skilled Manual, Clerical, Management, Manual'
    examples:
    - Clerical
    - Management
    - Manual
  - name: HouseOwnerFlag
    display_name: House Owner Flag
    type: string
    description: 'House ownership flag: 1 = Yes, 0 = No'
    examples:
    - '0'
    - '1'
  - name: NumberCarsOwned
    display_name: Cars Owned
    type: integer
    description: Number of cars owned
    examples:
    - 0
    - 1
    - 2
    range:
    - 0
    - 4
  - name: AddressLine1
    display_name: Address
    type: string
    description: Address line 1
    examples:
    - 00, rue Saint-Lazare
    - 02, place de Fontenoy
    - 035, boulevard du Montparnasse
  - name: Phone
    display_name: Phone
    type: string
    description: Phone number
    examples:
    - 1 (11) 500 555-0110
    - 1 (11) 500 555-0111
    - 1 (11) 500 555-0112
  - name: DateFirstPurchase
    display_name: First Purchase Date
    type: date
    description: Date of first purchase
    examples:
    - '2010-12-29'
    - '2010-12-30'
    - '2010-12-31'
    range:
    - '2010-12-29'
    - '2014-01-28'
  - name: CommuteDistance
    display_name: Commute Distance
    type: string
    description: 'Commute distance: 0-1 Miles, 1-2 Miles, 2-5 Miles, 5-10 Miles, 10+ Miles'
    examples:
    - 0-1 Miles
    - 10+ Miles
    - 1-2 Miles
- name: products
  table: dbo.DimProduct
  description: 'Product catalog. Each row represents one product including name, SKU, color, size, list price, cost, and subcategory.

    '
  primary_key: ProductKey
  columns:
  - name: ProductKey
    display_name: Product ID
    type: integer
    description: Product identifier (PK)
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 606
  - name: ProductAlternateKey
    display_name: SKU
    type: string
    description: Alternate product identifier (SKU)
    examples:
    - AR-5381
    - BA-8327
    - BB-7421
  - name: ProductSubcategoryKey
    display_name: Sub Category Key
    type: integer
    description: FK to product subcategory table
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 37
    foreign_key: product_subcategories.ProductSubcategoryKey
  - name: EnglishProductName
    display_name: Product Name
    type: string
    description: Product name (English)
    examples:
    - Adjustable Race
    - All-Purpose Bike Stand
    - AWC Logo Cap
  - name: StandardCost
    display_name: Manufacturing Cost
    type: decimal
    description: Standard manufacturing cost (USD)
    examples:
    - 0.8565
    - 1.4923
    - 1.8663
    range:
    - 0.8565
    - 2171.2942
  - name: Color
    display_name: Color
    type: string
    description: Product color
    examples:
    - Black
    - Blue
    - Grey
  - name: SafetyStockLevel
    display_name: Safety Stock Level
    type: integer
    description: Safety stock level
    examples:
    - 4
    - 60
    - 100
    range:
    - 4
    - 1000
  - name: ReorderPoint
    display_name: Reorder Point
    type: integer
    description: Reorder point threshold
    examples:
    - 3
    - 45
    - 75
    range:
    - 3
    - 750
  - name: ListPrice
    display_name: List Price
    type: decimal
    description: List price (USD)
    examples:
    - 2.29
    - 3.99
    - 4.99
    range:
    - 2.29
    - 3578.27
  - name: Size
    display_name: Size
    type: string
    description: Product size
    examples:
    - '38'
    - '40'
    - '42'
  - name: DaysToManufacture
    display_name: Days to Manufacture
    type: integer
    description: Number of days to manufacture
    examples:
    - 0
    - 1
    - 2
    range:
    - 0
    - 4
  - name: DealerPrice
    display_name: Dealer Price
    type: decimal
    description: Dealer price (USD)
    examples:
    - 1.374
    - 2.394
    - 2.994
    range:
    - 1.374
    - 2146.962
  - name: Status
    display_name: Status
    type: string
    description: 'Product status: Current, NULL (discontinued)'
    examples:
    - Current
- name: product_subcategories
  table: dbo.DimProductSubcategory
  description: Product subcategories (e.g., Road Bikes, Mountain Bikes, Jerseys...)
  primary_key: ProductSubcategoryKey
  columns:
  - name: ProductSubcategoryKey
    display_name: Sub Category Key
    type: integer
    description: Subcategory identifier (PK)
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 37
  - name: ProductCategoryKey
    display_name: Main Category Key
    type: integer
    description: FK to product category table
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 4
    foreign_key: product_categories.ProductCategoryKey
  - name: EnglishProductSubcategoryName
    display_name: Sub Category Name
    type: string
    description: Product subcategory name (English)
    examples:
    - Bib-Shorts
    - Bike Racks
    - Bike Stands
- name: product_categories
  table: dbo.DimProductCategory
  description: 'Product categories: Bikes, Components, Clothing, Accessories'
  primary_key: ProductCategoryKey
  columns:
  - name: ProductCategoryKey
    display_name: Main Category Key
    type: integer
    description: Category identifier (PK)
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 4
  - name: EnglishProductCategoryName
    display_name: Main Category Name
    type: string
    description: 'Product category name (English): Bikes, Components, Clothing, Accessories'
    examples:
    - Accessories
    - Bikes
    - Clothing
- name: dates
  table: dbo.DimDate
  description: 'Date dimension table. Contains day, week, month, quarter, year information for both Calendar and Fiscal calendars.

    '
  primary_key: DateKey
  columns:
  - name: DateKey
    display_name: Date Key
    type: integer
    description: 'Date identifier (PK, format: YYYYMMDD)'
    examples:
    - 20050101
    - 20050102
    - 20050103
    range:
    - 20050101
    - 20141231
  - name: FullDateAlternateKey
    display_name: Full Date
    type: date
    description: Full date value
    examples:
    - '2005-01-01'
    - '2005-01-02'
    - '2005-01-03'
    range:
    - '2005-01-01'
    - '2014-12-31'
  - name: EnglishDayNameOfWeek
    display_name: Day of Week Name
    type: string
    description: 'Day name of week (English): Monday, Tuesday...'
    examples:
    - Friday
    - Monday
    - Saturday
  - name: DayNumberOfMonth
    display_name: Day of Month
    type: integer
    description: Day number within month (1-31)
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 31
  - name: DayNumberOfYear
    display_name: Day of Year
    type: integer
    description: Day number within year (1-366)
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 366
  - name: WeekNumberOfYear
    display_name: Week of Year
    type: integer
    description: Week number within year (1-53)
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 53
  - name: EnglishMonthName
    display_name: Month Name
    type: string
    description: 'Month name (English): January, February...'
    examples:
    - April
    - August
    - December
  - name: MonthNumberOfYear
    display_name: Month of Year
    type: integer
    description: Month number within year (1-12)
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 12
  - name: CalendarQuarter
    display_name: Quarter
    type: integer
    description: Calendar quarter (1-4)
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 4
  - name: CalendarYear
    display_name: Year
    type: integer
    description: Calendar year
    examples:
    - 2005
    - 2006
    - 2007
    range:
    - 2005
    - 2014
  - name: CalendarSemester
    display_name: Semester
    type: integer
    description: Calendar semester (1-2)
    examples:
    - 1
    - 2
    range:
    - 1
    - 2
  - name: FiscalQuarter
    display_name: Fiscal Quarter
    type: integer
    description: Fiscal quarter (1-4)
    examples:
    - 1
    - 2
    - 3
    range:
    - 1
    - 4
  - name: FiscalYear
    display_name: Fiscal Year
    type: integer
    description: Fiscal year
    examples:
    - 2005
    - 2006
    - 2007
    range:
    - 2005
    - 2014
