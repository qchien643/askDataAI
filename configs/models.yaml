    - 20110105
    - 20110106
    - 20110107
    range:
    - 20110105
    - 20140204
  - name: CustomerKey
    display_name: Customer ID
    type: integer
    description: FK to customers table
    examples:
    - 11000
    - 11001
    - 11002
    range:
    - 11000
    - 29483
    foreign_key: customers.CustomerKey
  - name: PromotionKey
    display_name: Promotion Key
    type: integer
    description: FK to promotions table
    examples:
    - 1
